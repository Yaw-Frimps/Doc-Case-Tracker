<!DOCTYPE html>
<html lang="en" xml:lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <title>DocCaseTracker Email Footer</title>
</head>

<body>

<div th:fragment="footer">

    <table
            style="
            width:100%;
            margin-top:30px;
            border-top:1px solid #E2E8F0;
            padding-top:20px;
            border-collapse:collapse;">

        <thead>
        <tr>
            <th scope="col" style="display:none;">
                Footer Information
            </th>
        </tr>
        </thead>

        <tbody>
        <tr>
            <td style="text-align:center;">

                <p style="
                color:#64748B;
                font-size:13px;
                margin:0;">
                    This is an automated notification from
                    DocCaseTracker.
                </p>

                <p style="
                color:#94A3B8;
                font-size:12px;
                margin-top:8px;">
                    © 2026 DocCaseTracker. All Rights Reserved.
                </p>

            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
