<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Password Reset OTP</title>
</head>

<body style="
background:#F8FAFC;
padding:40px;
font-family:'Segoe UI',sans-serif;">

<div style="
max-width:650px;
margin:auto;
background:#ffffff;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.08);">

    <div th:replace="~{email/layout/header :: header}"></div>

    <div style="padding:40px;">

        <h2 style="color:#1E293B;">
            Password Reset Request
        </h2>

        <p style="color:#475569;">
            We received a request to reset your password.
        </p>

        <div style="
        margin:30px 0;
        text-align:center;
        background:#EFF6FF;
        border:1px solid #BFDBFE;
        border-radius:10px;
        padding:25px;">

            <span
                    th:text="${otp}"
                    style="
                    font-size:38px;
                    font-weight:bold;
                    color:#2563EB;
                    letter-spacing:8px;">
            </span>

        </div>

        <p style="color:#475569;">
            This OTP will expire in <strong>10 minutes</strong>.
        </p>

        <p style="color:#DC2626;">
            Never share this code with anyone.
        </p>

    </div>

    <div th:replace="~{email/layout/footer :: footer}"></div>

</div>

</body>
</html>
